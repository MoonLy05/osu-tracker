<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi progreso osu!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen text-slate-100">
    <div class="magical-bg"></div>
    <main class="relative mx-auto flex min-h-screen w-full max-w-7xl flex-col px-4 py-8 sm:px-6 lg:px-8">
        <section class="magical-hero mb-6 overflow-hidden rounded-[2rem] p-6 shadow-2xl sm:p-8 lg:p-10">
            <div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
                <div class="max-w-3xl">
                    <p class="eyebrow mb-3">osu! tracker • magic girl edition</p>
                    <h1 class="mb-4 text-4xl font-black tracking-tight text-white sm:text-5xl lg:text-6xl">
                        Mi progreso en osu!
                    </h1>
                    <p class="max-w-2xl text-base text-slate-200/90 sm:text-lg">
                        Un panel brillante, pastel y adorable para revisar perfil, estadísticas y daily challenges.
                    </p>
                </div>
                <div class="self-start rounded-full border border-white/20 bg-white/10 px-4 py-2 text-sm font-semibold text-pink-100 shadow-lg backdrop-blur">
                    ✦ Actualizando en vivo
                </div>
            </div>
        </section>

        <div id="datos" class="space-y-6">
            <div class="loading-card rounded-[2rem] p-6 text-center text-slate-200 shadow-lg">
                Cargando datos mágicos...
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
